<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mosquito Trap Dashboard v10</title>
  <script defer src="static/chart.js"></script>
  <script defer src="static/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="static/leaflet.css"/>
  <script defer src="static/leaflet.js"></script>
  <script defer src="static/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="static/leaflet.markercluster_MarkerCluster.css"/>
  <link rel="stylesheet" href="static/leaflet.markercluster_MarkerCluster.Default.css"/>
  <style>
    body { font-family: Arial,sans-serif; margin: 16px; background:#f6f8fc; color:#1f2937; }
    .top { display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .badge { background:#ecfdf3; color:#027a48; border:1px solid #a6f4c5; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:14px 0; }
    .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    .card { background:#fff; border-radius:10px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .label { font-size:12px; color:#6b7280; }
    .val { font-size:24px; font-weight:700; }
    .filters { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:12px; }
    select,input { width:100%; padding:8px; border:1px solid #d1d5db; border-radius:8px; background:#fff; box-sizing: border-box; }
    .actions { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    button { border:1px solid #d1d5db; background:#fff; padding:8px 10px; border-radius:8px; cursor:pointer; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; }
    th,td { border-bottom:1px solid #eef2f7; padding:8px; text-align:left; font-size:14px; }
    #map { height:320px; border-radius:10px; }
    th { background:#f3f6fb; position:sticky; top:0; }
    .small { font-size:12px; color:#6b7280; }
    
    .pagination { display:flex; gap:8px; align-items:center; justify-content:flex-end; padding:12px; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 900px) { .grid,.charts-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width: 768px) { .charts-grid { grid-template-columns:1fr; } }
    @media (max-width: 600px) { .grid,.filters { grid-template-columns:1fr; } .val { font-size:20px; } }
  </style>
</head>
<body>
  <div class="top">
    <h2 style="margin:0">Mosquito Trap Dashboard v10</h2>
    <div>
      <span class="badge" id="statusBadge">Ready</span>
      <span class="small" id="lastUpdated"></span>
    </div>
  </div>

  <div class="grid">
    <div class="card"><div class="label">Total Mosquitoes</div><div class="val" id="kTotal">-</div></div>
    <div class="card"><div class="label">Total Records</div><div class="val" id="kRows">-</div></div>
    <div class="card"><div class="label">Total Areas</div><div class="val" id="kAreas">-</div></div>
    <div class="card"><div class="label">Total Traps</div><div class="val" id="kTraps">-</div></div>
  </div>

  <div class="filters">
    <select id="fArea"><option value="">All Areas</option></select>
    <select id="fTrap"><option value="">All Traps</option></select>
  </div>

  <div class="actions">
    <button onclick="resetFilters()">Reset Filters</button>
  </div>
  
  <div class="charts-grid">
    <div class="card"><canvas id="cLine" height="150"></canvas></div>
    <div class="card"><canvas id="cBar" height="150"></canvas></div>
  </div>

  <div class="card" style="margin-bottom:12px;">
    <h3 style="margin-top:0">GPS Map</h3>
    <div class="small" id="mapStatus" style="margin-bottom:8px;color:#6b7280;">Map loading...</div>
    <div id="map"></div>
  </div>

  <div class="card" style="padding:0;">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Area</th>
          <th>Trap</th>
          <th>Species</th>
          <th>Count</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
    <div class="pagination">
      <span id="pageInfo" class="small"></span>
      <button id="btnPrev" onclick="changePage(-1)">Previous</button>
      <button id="btnNext" onclick="changePage(1)">Next</button>
    </div>
  </div>

<script>
let barChart = null, lineChart = null;
let map = null;
let mapMarkersLayer = null;

let currentPage = 1;
const LIMIT = 50;
let totalPages = 1;

const DEFAULT_CENTER = [-25.2744, 133.7751]; // Australia center
const DEFAULT_ZOOM = 4;

function setStatus(text, type = 'info') {
    const badge = document.getElementById('statusBadge');
    badge.textContent = text;
    if (type === 'error') {
        badge.style.background = '#fef2f2'; badge.style.color = '#dc2626'; badge.style.borderColor = '#fca5a5';
    } else if (type === 'loading') {
        badge.style.background = '#eff6ff'; badge.style.color = '#1d4ed8'; badge.style.borderColor = '#bfdbfe';
    } else {
        badge.style.background = '#ecfdf3'; badge.style.color = '#027a48'; badge.style.borderColor = '#a6f4c5';
    }
}

function buildQueryString() {
    const area = document.getElementById('fArea').value;
    const trap = document.getElementById('fTrap').value;
    const params = new URLSearchParams();
    if (area) params.append('area', area);
    if (trap) params.append('trap_id', trap);
    return params.toString();
}

async function loadFilters() {
    try {
        const areaRes = await fetch('/api/filters/areas');
        const areas = await areaRes.json();
        const fArea = document.getElementById('fArea');
        areas.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a; opt.textContent = a;
            fArea.appendChild(opt);
        });

        const trapRes = await fetch('/api/filters/traps');
        const traps = await trapRes.json();
        const fTrap = document.getElementById('fTrap');
        traps.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            fTrap.appendChild(opt);
        });
    } catch(e) { console.error('Error loading filters', e); }
}

async function updateDependentFilters() {
    const area = document.getElementById('fArea').value;
    try {
        const url = area ? `/api/filters/traps?area=${encodeURIComponent(area)}` : '/api/filters/traps';
        const trapRes = await fetch(url);
        const traps = await trapRes.json();
        
        const fTrap = document.getElementById('fTrap');
        const currentVal = fTrap.value;
        fTrap.innerHTML = '<option value="">All Traps</option>';
        
        traps.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            fTrap.appendChild(opt);
        });
        
        if (traps.includes(currentVal)) {
            fTrap.value = currentVal;
        }
    } catch(e) { console.error('Error updating traps filter', e); }
}

async function loadKPI() {
    try {
        const qs = buildQueryString();
        const res = await fetch(`/api/kpi?${qs}`);
        const data = await res.json();
        document.getElementById('kTotal').textContent = data.total_mosquitoes || 0;
        document.getElementById('kRows').textContent = data.total_records || 0;
        document.getElementById('kAreas').textContent = data.total_areas || 0;
        document.getElementById('kTraps').textContent = data.total_traps || 0;
    } catch(e) { console.error('Error loading KPI', e); }
}

async function loadTable() {
    try {
        const qs = buildQueryString();
        const res = await fetch(`/api/table?page=${currentPage}&limit=${LIMIT}&${qs}`);
        const result = await res.json();
        
        const tb = document.getElementById('tb');
        tb.innerHTML = '';
        
        result.data.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${r.date || '-'}</td>
                <td>${r.area}</td>
                <td>${r.trap}</td>
                <td>${r.mosquito_name}</td>
                <td>${r.number_of_mosquitoes}</td>
            `;
            tb.appendChild(tr);
        });

        totalPages = result.pagination.total_pages;
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1} (${result.pagination.total_records} records)`;
        document.getElementById('btnPrev').disabled = currentPage <= 1;
        document.getElementById('btnNext').disabled = currentPage >= totalPages;

    } catch(e) { console.error('Error loading table', e); }
}

async function loadBarChart() {
    try {
        const qs = buildQueryString();
        const res = await fetch(`/api/chart/bar?${qs}`);
        const data = await res.json();
        
        const labels = data.map(d => d.species);
        const vals = data.map(d => d.count);
        
        if(barChart) barChart.destroy();
        barChart = new Chart(document.getElementById('cBar'), {
            type:'bar',
            data:{labels,datasets:[{label:'Count',data:vals, backgroundColor: '#a6f4c5', borderColor: '#027a48', borderWidth: 1 }]},
            options:{responsive:true,maintainAspectRatio: false,plugins:{legend:{display:false}, title: { display: true, text: 'Top 10 Species' }}}
        });
    } catch(e) { console.error('Error loading bar chart', e); }
}

async function loadLineChart() {
    try {
        const qs = buildQueryString();
        const res = await fetch(`/api/chart/line?${qs}`);
        const data = await res.json();
        
        const chartData = data.map(d => ({ x: d.date, y: d.count }));
        
        if(lineChart) lineChart.destroy();
        lineChart = new Chart(document.getElementById('cLine'), {
            type:'line',
            data:{datasets:[{label:'Records',data:chartData, fill: false, borderColor: 'rgb(75, 192, 192)', tension: 0.1 }]},
            options:{
                responsive:true,maintainAspectRatio: false,
                scales: { x: { type: 'time', time: { unit: 'month' } } },
                plugins:{legend:{display:false}, title: { display: true, text: 'Records over Time' }}
            }
        });
    } catch(e) { console.error('Error loading line chart', e); }
}

async function loadMap() {
    const mapStatus = document.getElementById('mapStatus');
    try {
        if (!map) {
            map = L.map('map').setView(DEFAULT_CENTER, DEFAULT_ZOOM);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 18 }).addTo(map);
        }

        mapStatus.textContent = 'Loading map data...';
        const qs = buildQueryString();
        const res = await fetch(`/api/map?${qs}`);
        const data = await res.json();

        if (mapMarkersLayer) map.removeLayer(mapMarkersLayer);

        const useCluster = typeof L.markerClusterGroup === 'function';
        mapMarkersLayer = useCluster
            ? L.markerClusterGroup({ maxClusterRadius: 50, disableClusteringAtZoom: 14 })
            : L.layerGroup();

        let validPoints = 0;
        const bounds = [];
        data.forEach(r => {
            if (r.latitude != null && r.longitude != null) {
                validPoints++;
                bounds.push([r.latitude, r.longitude]);
                const mk = L.circleMarker([r.latitude, r.longitude], {
                    radius: Math.max(5, Math.log(r.count + 1) * 3), 
                    color: '#e60000', weight: 1, opacity: 0.8, fillOpacity: 0.6 
                }).bindPopup(`<b>Area:</b> ${r.area}<br/><b>Trap:</b> ${r.trap}<br/><b>Records:</b> ${r.count}`);
                mapMarkersLayer.addLayer(mk);
            }
        });

        map.addLayer(mapMarkersLayer);
        if (bounds.length > 0) {
            map.fitBounds(L.latLngBounds(bounds).pad(0.1));
        } else {
            map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
        }
        mapStatus.textContent = `Map ready (${validPoints} locations).`;

    } catch(e) { 
        console.error('Error loading map', e); 
        mapStatus.textContent = 'Error loading map.';
    }
}

async function refreshAll() {
    setStatus('Loading...', 'loading');
    await Promise.all([
        loadKPI(),
        loadTable(),
        loadBarChart(),
        loadLineChart()
    ]);
    loadMap(); // non-blocking
    setStatus('Ready');
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleString('en-AU');
}

function changePage(delta) {
    const newPage = currentPage + delta;
    if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        setStatus('Loading page...', 'loading');
        loadTable().then(() => setStatus('Ready'));
    }
}

function resetFilters() {
    document.getElementById('fArea').value = '';
    document.getElementById('fTrap').value = '';
    currentPage = 1;
    updateDependentFilters().then(() => refreshAll());
}

document.getElementById('fArea').addEventListener('change', () => {
    currentPage = 1;
    updateDependentFilters().then(() => refreshAll());
});

document.getElementById('fTrap').addEventListener('change', () => {
    currentPage = 1;
    refreshAll();
});

async function main() {
    await loadFilters();
    await refreshAll();
}

window.addEventListener('DOMContentLoaded', main);

</script>
</body>
</html>
