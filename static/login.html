<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Mosquito Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    body { background-color: #f6f8fc; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .brand-text { color: #027a48; font-weight: 700; }
  </style>
</head>
<body>
  <div class="login-card">
    <h3 class="text-center mb-4">Mosquito <span class="brand-text">Dashboard</span></h3>
    <form id="loginForm">
      <div class="mb-3">
        <label>Username</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="mb-4">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-success w-100 mb-3" style="background:#027a48">Login</button>
      <div id="errorMsg" class="text-danger text-center" style="display:none; font-size:14px;">Invalid username or password</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      
      const res = await fetch('/api/v12/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      
      if(res.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
