<!doctype html>
<html lang='vi'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Mosquito Trap Dashboard MVP</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f7f9fc; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card { background:#fff; border-radius:12px; padding:14px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .k { font-size:12px; color:#64748b; }
    .v { font-size:28px; font-weight:700; margin-top:4px; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; }
    th, td { border-bottom:1px solid #eef2f7; padding:10px; text-align:left; }
    th { background:#f1f5f9; }
  </style>
</head>
<body>
  <div class='header'>
    <h2>Dashboard theo dõi bẫy muỗi (MVP)</h2>
    <div>Cập nhật: 2026-03-19 20:24:00</div>
  </div>

  <div class='grid'>
    <div class='card'><div class='k'>Total Traps</div><div class='v'>4</div></div>
    <div class='card'><div class='k'>Active Traps</div><div class='v'>2</div></div>
    <div class='card'><div class='k'>Offline Traps</div><div class='v'>1</div></div>
    <div class='card'><div class='k'>Maintenance Traps</div><div class='v'>1</div></div>
    <div class='card'><div class='k'>Total Mosquito Count</div><div class='v'>139</div></div>
    <div class='card'><div class='k'>Avg Mosquito / Active Trap</div><div class='v'>69.5</div></div>
  </div>

  <h3 style='margin-top:24px;'>Top khu vực theo mật độ muỗi</h3>
  <table>
    <thead><tr><th>#</th><th>Khu vực</th><th>Số muỗi</th></tr></thead>
    <tbody><tr><td>1</td><td>A01</td><td>123</td></tr><tr><td>2</td><td>A02</td><td>12</td></tr><tr><td>3</td><td>A03</td><td>4</td></tr></tbody>
  </table>
</body>
</html>
